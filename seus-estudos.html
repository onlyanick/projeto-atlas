    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Encontre ferramentas de estudos e organize seus projetos em um só lugar."
    />
    <title>Seus Estudos - Projeto Atlas</title>
    <link rel="stylesheet" href="CSS/main.css" />
    <link rel="icon" type="image/png" href="/0Imagens/icon.png" />
    <script src="main.js" defer></script>
    <script src="seusEstudos.js" defer></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

    <!-- FONTES -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Vend+Sans:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"

      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>

  </head>
  <body>
    <header><div id="header"></div></header>
    <aside>
      <div id="sidebar"></div>
    </aside>
    <main id="conteudo" tabindex="-1">
      <h2 class="headline">Seus estudos</h2>
      <div class="workplace">
        <div class="slot">
          <div id="calendar"></div>
          <button class="calendarBtn" id="buttonBack"><</button>
          <button class="calendarBtn" id="buttonNext">></button>
        </div>

        <div class="slot">
          <div id="pomodoro">
            <h3>Timer Pomodoro</h3>
            <label id="focusP" for="pomoTimer">Tempo de foco</label>
            <input id="pomoTimer" type="number" value="25" />
            <p id="timeDisplay"></p>

            <label id="pauseP" for="pauseTimer">Tempo de intervalo</label>
            <input id="pauseTimer" type="number" value="5" />
            <span></span>
            <p id="pomoCounter">Ciclos completos: 0/4</p>
          </div>
          <button class="pomodoroBtn" id="startBtn">Começar</button>
          <button class="pomodoroBtn" id="stopBtn">Parar</button>
        </div>

        <div class="slot">
          <div id="toDoList">
            <h3>Lista de Tarefas</h3>
          </div>
          <button class="toDoBtn" id="addBtn">Adicionar</button>
        </div>

        <div class="slot">
          <div id="notepad">
            <h3>Bloco de Notas</h3>
          </div>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
